<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>b0nd0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    #world { position: fixed; inset: 0; z-index: 0; }
    b0nd0-footer { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <main>
    <canvas id="world"></canvas>
  </main>
  <script src="https://unpkg.com/matter-js@0.19.0/build/matter.min.js"></script>
  <script src="footer.js"></script>
  <b0nd0-footer></b0nd0-footer>
  <script src="nav.js"></script>
  <script>
  (function () {
    const { Engine, Runner, Bodies, Body, World, Mouse, MouseConstraint, Events, Composite } = Matter;

    const canvas = document.getElementById('world');
    const ctx    = canvas.getContext('2d');
    const dpr    = window.devicePixelRatio || 1;
    let W = window.innerWidth;
    let H = window.innerHeight;

    function sizeCanvas() {
      canvas.width        = W * dpr;
      canvas.height       = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(dpr, dpr);
    }
    sizeCanvas();

    const engine = Engine.create({ gravity: { y: 1.8 }, enableSleeping: true });
    Runner.run(Runner.create(), engine);

    const floor = Bodies.rectangle(W / 2,  H + 30, W * 3, 60, { isStatic: true });
    const wallL = Bodies.rectangle(-30,    H / 2,  60, H * 3, { isStatic: true });
    const wallR = Bodies.rectangle(W + 30, H / 2,  60, H * 3, { isStatic: true });
    World.add(engine.world, [floor, wallL, wallR]);

    const SZ   = Math.min(Math.max(W * 0.065, 22), 42);
    const FONT = `300 ${SZ}px Inter, -apple-system, sans-serif`;
    ctx.font   = FONT;

    const COUNT = W < 768 ? 36 : 72;
    const CHARS = 'b0nd0'.repeat(Math.ceil(COUNT / 5)).split('').slice(0, COUNT);
    const bodies = [];
    let ready = false;

    function spawnAll() {
      ctx.font = FONT;
      CHARS.forEach(ch => {
        const tw = ctx.measureText(ch).width + 10;
        const b  = Bodies.rectangle(
          60 + Math.random() * (W - 120),
          -(SZ + Math.random() * H * 0.7),
          tw, SZ * 1.2,
          { restitution: 0.1, friction: 0.5, frictionAir: 0.05, label: ch }
        );
        Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.2);
        World.add(engine.world, b);
        bodies.push(b);
      });
      setTimeout(() => { ready = true; }, 2500);
    }

    const go = () => { spawnAll(); };
    const t  = setTimeout(go, 800);
    document.fonts.ready.then(() => { clearTimeout(t); go(); });

    const mouse = Mouse.create(canvas);
    Mouse.setScale(mouse, { x: 1 / dpr, y: 1 / dpr });
    const mc    = MouseConstraint.create(engine, {
      mouse,
      constraint: { stiffness: 0.15, damping: 0.1, render: { visible: false } },
    });
    World.add(engine.world, mc);
    canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    let grabbing = false;
    Events.on(mc, 'startdrag', () => { grabbing = true; });

    let downAt = null;
    function pDown(x, y) { grabbing = false; downAt = { x, y }; }
    function pUp(x, y) {
      if (!grabbing && downAt && Math.hypot(x - downAt.x, y - downAt.y) < 8) onTap();
      downAt = null;
    }
    canvas.addEventListener('mousedown',  e => pDown(e.clientX, e.clientY));
    canvas.addEventListener('mouseup',    e => pUp(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => { e.preventDefault(); pDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); pUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });

    let state  = 'scattered';
    let formed = [];

    function onTap() {
      if (!ready || state === 'forming') return;
      state === 'formed' ? scatter() : gather();
    }

    function gather() {
      formed.forEach(b => { b._forming = false; b._formed = false; Body.setStatic(b, false); });
      formed = [];
      const needed = ['b', '0', 'n', 'd', '0'];
      const used   = new Set();
      const picks  = [];
      for (const ch of needed) {
        const pool = bodies.filter(b => b.label === ch && !used.has(b));
        if (!pool.length) return;
        const p = pool[Math.floor(Math.random() * pool.length)];
        used.add(p);
        picks.push(p);
      }
      const gap = SZ * 1.1;
      picks.forEach((b, i) => {
        Body.setVelocity(b, { x: 0, y: 0 });
        Body.setAngularVelocity(b, 0);
        b._forming = true;
        b._formed  = false;
        b._tx = W / 2 - gap * 2 + i * gap + (Math.random() - 0.5) * SZ * 0.4;
        b._ty = H / 2                      + (Math.random() - 0.5) * SZ * 0.5;
        b._ta = (Math.random() - 0.5) * 0.5;
        formed.push(b);
      });
      state = 'forming';
    }

    function scatter() {
      formed.forEach(b => {
        b._forming = false;
        b._formed  = false;
        Body.setStatic(b, false);
        const dx = b.position.x - W / 2;
        const dy = b.position.y - H / 2;
        const d  = Math.hypot(dx, dy) || 1;
        const f  = 0.015 + Math.random() * 0.018;
        Body.applyForce(b, b.position, {
          x: (dx / d) * f + (Math.random() - 0.5) * 0.008,
          y: (dy / d) * f - 0.02,
        });
        Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.6);
      });
      formed = [];
      state  = 'scattered';
    }

    Events.on(engine, 'beforeUpdate', () => {
      Composite.allBodies(engine.world).forEach(b => {
        if (!b.isStatic && b.velocity.y < -1) {
          Body.applyForce(b, b.position, { x: 0, y: b.mass * 0.002 });
        }
      });

      if (state !== 'forming') return;
      const gatherK = W < 768 ? 0.0014 : 0.0032;
      let done = true;
      formed.forEach(b => {
        const dx = b._tx - b.position.x;
        const dy = b._ty - b.position.y;
        if (Math.hypot(dx, dy) > 3) done = false;
        Body.applyForce(b, b.position, { x: dx * gatherK, y: dy * gatherK });
        Body.setVelocity(b, { x: b.velocity.x * 0.87, y: b.velocity.y * 0.87 });
        const da = ((b._ta - b.angle + Math.PI) % (Math.PI * 2)) - Math.PI;
        Body.setAngularVelocity(b, b.angularVelocity * 0.87 + da * 0.056);
      });
      if (done && formed.length) {
        formed.forEach(b => {
          Body.setPosition(b,        { x: b._tx, y: b._ty });
          Body.setAngle(b,           b._ta);
          Body.setVelocity(b,        { x: 0, y: 0 });
          Body.setAngularVelocity(b, 0);
          Body.setStatic(b,          true);
          b._forming = false;
          b._formed  = true;
        });
        state = 'formed';
      }
    });

    let hintAlpha = 0;
    const hintIn = setTimeout(() => {
      const iv = setInterval(() => {
        hintAlpha += 0.04;
        if (hintAlpha >= 0.28) { hintAlpha = 0.28; clearInterval(iv); }
      }, 30);
    }, 2500);
    function fadeHint() {
      clearTimeout(hintIn);
      const iv = setInterval(() => {
        hintAlpha -= 0.04;
        if (hintAlpha <= 0) { hintAlpha = 0; clearInterval(iv); }
      }, 30);
      canvas.removeEventListener('mouseup',  fadeHint);
      canvas.removeEventListener('touchend', fadeHint);
    }
    canvas.addEventListener('mouseup',  fadeHint);
    canvas.addEventListener('touchend', fadeHint);

    function draw() {
      requestAnimationFrame(draw);
      ctx.clearRect(0, 0, W, H);
      ctx.font         = FONT;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      Composite.allBodies(engine.world).forEach(b => {
        if (!b.label || b.label.length !== 1) return;
        ctx.save();
        ctx.translate(b.position.x, b.position.y);
        ctx.rotate(b.angle);
        ctx.fillStyle = b._formed ? 'rgba(0,0,0,0.75)' : 'rgba(0,0,0,0.22)';
        ctx.fillText(b.label, 0, 0);
        ctx.restore();
      });
      if (hintAlpha > 0) {
        ctx.font      = `200 12px Inter, sans-serif`;
        ctx.fillStyle = `rgba(0,0,0,${hintAlpha})`;
        ctx.textAlign = 'center';
        ctx.fillText('tap', W / 2, H - 38);
      }
    }
    draw();

    window.addEventListener('resize', () => {
      W = window.innerWidth;
      H = window.innerHeight;
      sizeCanvas();
      Body.setPosition(floor,  { x: W / 2,  y: H + 30 });
      Body.setPosition(wallR,  { x: W + 30, y: H / 2  });
    });
  })();
  </script>
</body>
</html>
