<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>b0nd0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="slider" id="slider">
      <div class="slide">
        <p class="tagline">
          <span class="en">Pure craft, zero utility.<br>Held together by b0nd0.</span>
          <span class="ja">純度100%、実用性0%<br>洗練されたナンセンス</span>
        </p>
      </div>
      <div class="slide">
        <p class="tagline">
          <span class="en">Coming soon.</span>
          <span class="ja">近日公開。</span>
        </p>
      </div>
    </div>
    <div class="page-dots" id="pageDots">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>
  </main>
  <script src="footer.js"></script>
  <b0nd0-footer></b0nd0-footer>
  <script src="nav.js"></script>
  <script>
    (function () {
      const slider = document.getElementById('slider');
      const dots   = document.querySelectorAll('.dot');
      let current = 0;
      let startX  = 0;
      let dragging = false;

      function goTo(page) {
        current = page;
        slider.style.transform = 'translateX(-' + (page * 100) + '%)';
        dots.forEach(function (d, i) { d.classList.toggle('active', i === page); });
      }

      slider.addEventListener('touchstart', function (e) {
        startX = e.touches[0].clientX;
      }, { passive: true });

      slider.addEventListener('touchend', function (e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (dx < -40 && current < 1) goTo(1);
        else if (dx > 40 && current > 0) goTo(0);
      }, { passive: true });

      slider.addEventListener('mousedown', function (e) {
        startX   = e.clientX;
        dragging = true;
      });
      slider.addEventListener('mouseup', function (e) {
        if (!dragging) return;
        dragging = false;
        var dx = e.clientX - startX;
        if (dx < -40 && current < 1) goTo(1);
        else if (dx > 40 && current > 0) goTo(0);
      });
      slider.addEventListener('mouseleave', function () { dragging = false; });
    })();
  </script>
</body>
</html>
